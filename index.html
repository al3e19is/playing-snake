<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hud">
        <h1>Snake</h1>
        <p>Score: <span id="score">0</span></p>
      </header>
      <section
        id="board"
        class="board"
        role="grid"
        aria-label="Snake game board"
      ></section>
      <p id="status" class="status">Use arrow keys or WASD to start.</p>
      <div class="controls" aria-label="On-screen controls">
        <button data-dir="up" aria-label="Move up">Up</button>
        <div class="control-row">
          <button data-dir="left" aria-label="Move left">Left</button>
          <button data-dir="down" aria-label="Move down">Down</button>
          <button data-dir="right" aria-label="Move right">Right</button>
        </div>
      </div>
      <div class="actions">
        <button id="pause">Pause</button>
        <button id="restart">Restart</button>
      </div>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
